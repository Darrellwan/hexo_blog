<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Claude 模型選擇階梯</title>
  <desc id="desc">用任務型態判斷何時使用腳本、Sonnet、Opus 或 Fable 5。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14161a"/>
      <stop offset="1" stop-color="#201e17"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1325" cy="155" r="270" fill="#ffb454" opacity="0.07"/>
  <circle cx="190" cy="820" r="260" fill="#7dd3fc" opacity="0.07"/>
  <text x="90" y="105" fill="#f4efe6" font-size="54" font-weight="850" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">模型選擇不是排名，是任務分工</text>
  <text x="92" y="154" fill="#a9b1bd" font-size="24" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">Fable 5 是最高階的任務負責人，但不是所有工作都需要任務負責人。</text>

  <g transform="translate(95 235)" font-family="'Noto Sans TC', 'PingFang TC', sans-serif" filter="url(#shadow)">
    <g transform="translate(0 440)">
      <rect width="1120" height="110" rx="26" fill="#1d232b" stroke="#3e4652"/>
      <text x="42" y="68" fill="#7dd3fc" font-size="31" font-weight="900">腳本 / 低成本模型</text>
      <text x="390" y="48" fill="#e6edf3" font-size="24">大量格式轉換、重複整理、規則明確的批次工作</text>
      <text x="390" y="82" fill="#a9b1bd" font-size="20">判斷：如果能寫成 deterministic script，就不要燒最強模型。</text>
    </g>
    <g transform="translate(95 300)">
      <rect width="1120" height="110" rx="26" fill="#202829" stroke="#48646a"/>
      <text x="42" y="68" fill="#8bd7a2" font-size="31" font-weight="900">Sonnet</text>
      <text x="390" y="48" fill="#e6edf3" font-size="24">日常 coding、清楚 bug、文件整理、互動式探索</text>
      <text x="390" y="82" fill="#a9b1bd" font-size="20">判斷：任務短、可以快速來回、錯了容易修。</text>
    </g>
    <g transform="translate(190 160)">
      <rect width="1120" height="110" rx="26" fill="#26251f" stroke="#716340"/>
      <text x="42" y="68" fill="#f7c873" font-size="31" font-weight="900">Opus</text>
      <text x="390" y="48" fill="#e6edf3" font-size="24">重要判斷、複雜分析、高品質 review、難一點的實作</text>
      <text x="390" y="82" fill="#a9b1bd" font-size="20">判斷：需要更強推理，但還不是多階段長任務。</text>
    </g>
    <g transform="translate(285 20)">
      <rect width="1120" height="110" rx="26" fill="#312314" stroke="#ffb454"/>
      <text x="42" y="68" fill="#ffb454" font-size="31" font-weight="900">Fable 5</text>
      <text x="390" y="48" fill="#f4efe6" font-size="24">長時間 agent、跨檔案重構、多階段專案、驗證迴圈</text>
      <text x="390" y="82" fill="#d7c8b2" font-size="20">判斷：任務需要規劃、執行、驗證、修正與交接。</text>
    </g>
  </g>

  <g transform="translate(113 850)" font-family="'Noto Sans TC', 'PingFang TC', sans-serif">
    <rect width="1375" height="80" rx="22" fill="#111419" stroke="#39404a"/>
    <text x="42" y="51" fill="#f4efe6" font-size="24" font-weight="800">使用原則：</text>
    <text x="175" y="51" fill="#cbd5df" font-size="23">先用任務風險與工作長度選模型，不要只用「哪個最強」選模型。</text>
  </g>
</svg>
